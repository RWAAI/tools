<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>rAI Weekly Metrics</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111214;
      --panel: #1a1c20;
      --panel-2: #22252a;
      --text: #f4f5f7;
      --muted: #9ca3af;
      --line: rgba(255, 255, 255, .1);
      --accent: #ff8a2a;
      --blue: #4f7cff;
      --green: #19c37d;
      --radius: 8px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 28px 18px 44px;
    }
    header {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--line);
    }
    h1 {
      font-size: 26px;
      margin: 0 0 6px;
      letter-spacing: 0;
    }
    .sub, .stamp, .note {
      color: var(--muted);
      font-size: 13px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }
    a.button {
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 13px;
      white-space: nowrap;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
    }
    .card h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .metric {
      background: var(--panel-2);
      border-radius: 6px;
      padding: 12px;
      min-height: 94px;
    }
    .metric label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }
    .metric strong {
      display: block;
      font-size: 25px;
      line-height: 1.1;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }
    .metric small {
      display: block;
      margin-top: 7px;
      color: var(--muted);
      font-size: 11px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      font-size: 13px;
    }
    th, td {
      text-align: left;
      padding: 9px 8px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }
    th {
      color: var(--muted);
      font-weight: 600;
    }
    td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
    .pill {
      display: inline-flex;
      padding: 2px 7px;
      border-radius: 999px;
      background: rgba(25, 195, 125, .12);
      color: var(--green);
      font-size: 11px;
    }
    .pill.warn {
      background: rgba(255, 138, 42, .14);
      color: var(--accent);
    }
    .section {
      margin-top: 16px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
    }
    .section h2 {
      margin: 0;
      font-size: 18px;
    }
    .source-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .source-row a {
      color: #9db7ff;
      font-size: 13px;
    }
    @media (max-width: 840px) {
      header, .grid { display: block; }
      .actions { justify-content: flex-start; margin-top: 14px; }
      .card { margin-top: 14px; }
      .metrics { grid-template-columns: 1fr; }
      th.optional, td.optional { display: none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>rAI Weekly Metrics</h1>
        <div class="sub">官网实际分红数据 + 30% WHT + 2% 年化管理费</div>
        <div class="stamp" id="updated">Loading...</div>
      </div>
      <div class="actions">
        <a class="button" href="./rai_weekly_metrics.json">JSON</a>
        <a class="button" href="./rai_distribution_detail.csv">分红明细 CSV</a>
        <a class="button" href="./rai_weekly_metrics_history.csv">历史记录 CSV</a>
      </div>
    </header>

    <div class="grid" id="productGrid"></div>

    <div class="section">
      <h2>底层 ETF 输入</h2>
      <div class="note">Current = 月派基金用最新一次实际分配年化；周派基金用最近 4 次实际分配均值 × 52 年化；TTM = 过去 12 个月实际分配合计。</div>
      <div id="fundTables"></div>
    </div>

    <div class="section">
      <h2>分红明细</h2>
      <div class="note">下表展示每只 ETF 最近 12 条分配记录。完整记录见 CSV。</div>
      <div id="distributionTables"></div>
    </div>

    <div class="section">
      <h2>Sources</h2>
      <div class="source-row" id="sources"></div>
    </div>
  </div>

  <script>
    const pct = v => `${(Number(v || 0) * 100).toFixed(1)}%`;
    const pct2 = v => `${(Number(v || 0) * 100).toFixed(2)}%`;
    const usd = v => `$${Number(v || 0).toFixed(4)}`;
    const statusPill = s => `<span class="pill ${String(s).startsWith('official') ? '' : 'warn'}">${s}</span>`;

    async function loadCsv(path) {
      const text = await fetch(path).then(r => r.text());
      const lines = text.trim().split(/\r?\n/);
      const headers = lines.shift().split(',');
      return lines.map(line => {
        const cells = [];
        let cell = '', inQuotes = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"' && line[i + 1] === '"') { cell += '"'; i++; }
          else if (ch === '"') inQuotes = !inQuotes;
          else if (ch === ',' && !inQuotes) { cells.push(cell); cell = ''; }
          else cell += ch;
        }
        cells.push(cell);
        return Object.fromEntries(headers.map((h, i) => [h, cells[i] || '']));
      });
    }

    function renderProducts(results) {
      const el = document.getElementById('productGrid');
      el.innerHTML = results.map(r => `
        <article class="card">
          <h2>${r.display_name}</h2>
          <div class="metrics">
            <div class="metric">
              <label>当前净分红率</label>
              <strong>${pct2(r.net_current_distribution_rate)}</strong>
              <small>月派最新一次，周派近 4 周均值</small>
            </div>
            <div class="metric">
              <label>TTM 净分红率</label>
              <strong>${pct(r.net_distribution_rate)}</strong>
              <small>过去 12 个月实际分配</small>
            </div>
            <div class="metric">
              <label>净总回报</label>
              <strong>${pct(r.net_total_return)}</strong>
              <small>${r.period_start} 至 ${r.period_end}</small>
            </div>
          </div>
          <table>
            <tr><th>Period</th><td>${r.period_label}</td></tr>
            <tr><th>Gross current distribution</th><td>${pct(r.gross_weighted_current_distribution_rate)}</td></tr>
            <tr><th>Gross TTM distribution</th><td>${pct(r.gross_weighted_ttm_distribution_rate)}</td></tr>
          </table>
        </article>
      `).join('');
    }

    function renderFunds(results) {
      const el = document.getElementById('fundTables');
      el.innerHTML = results.map(r => `
        <h3>${r.display_name}</h3>
        <table>
          <thead>
            <tr>
              <th>Fund</th><th class="num">Weight</th><th class="num">Latest dist</th>
              <th class="num">Current gross</th><th class="num">TTM dist/share</th>
              <th class="num">TTM gross</th><th>Status</th>
            </tr>
          </thead>
          <tbody>
            ${Object.entries(r.funds).map(([sym, f]) => `
              <tr>
                <td>${sym}</td>
                <td class="num">${pct(f.weight)}</td>
                <td class="num">${usd(f.latest_distribution_amount)}<br><span class="note">${f.latest_distribution_ex_date || '-'}</span></td>
                <td class="num">${pct(f.current_run_rate_distribution_rate)}</td>
                <td class="num">${usd(f.ttm_distribution_sum)}<br><span class="note">${f.ttm_distribution_count} records</span></td>
                <td class="num">${pct(f.gross_ttm_distribution_rate)}</td>
                <td>${(f.source_status || []).map(statusPill).join(' ')}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `).join('');
    }

    function renderDistributionTables(rows) {
      const el = document.getElementById('distributionTables');
      const groups = {};
      rows.forEach(r => (groups[r.symbol] ||= []).push(r));
      el.innerHTML = Object.keys(groups).sort().map(sym => `
        <h3>${sym}</h3>
        <table>
          <thead>
            <tr><th>Ex-date</th><th class="num">Amount/share</th><th class="optional">Payable</th><th class="optional">ROC</th><th>Status</th></tr>
          </thead>
          <tbody>
            ${groups[sym].slice(0, 12).map(r => `
              <tr>
                <td>${r.ex_date}</td>
                <td class="num">${usd(r.amount_per_share)}</td>
                <td class="optional">${r.payable_date || '-'}</td>
                <td class="optional">${r.roc || '-'}</td>
                <td>${statusPill(r.source_status)}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `).join('');
    }

    function renderSources(config) {
      const el = document.getElementById('sources');
      el.innerHTML = Object.entries(config.funds).map(([sym, f]) =>
        `<a href="${f.official_distribution_url}" target="_blank" rel="noopener">${sym} official</a>`
      ).join('');
    }

    async function main() {
      const data = await fetch('./rai_weekly_metrics.json').then(r => r.json());
      const distributionRows = await loadCsv('./rai_distribution_detail.csv');
      document.getElementById('updated').textContent = `Updated: ${data.updated_at}`;
      renderProducts(data.results);
      renderFunds(data.results);
      renderDistributionTables(distributionRows);
      renderSources(data.config);
    }

    main().catch(err => {
      document.getElementById('updated').textContent = `Load failed: ${err.message}`;
    });
  </script>
</body>
</html>
