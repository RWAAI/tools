<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RWAlpha Tools</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0D1117;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;margin:0;}
h1{font-size:28px;color:#00C6A2;margin-bottom:8px;}
p{color:#8B949E;margin-bottom:40px;font-size:14px;}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;max-width:600px;width:90%;}
a{display:block;background:#1C2128;border:1px solid #30363D;border-radius:12px;padding:24px;text-decoration:none;color:#fff;transition:border-color .2s;}
a:hover{border-color:#00C6A2;}
.label{font-size:11px;color:#00C6A2;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;}
.name{font-size:16px;font-weight:600;margin-bottom:6px;}
.desc{font-size:12px;color:#8B949E;}
</style>
</head>
<body>
<h1>RWAlpha Tools</h1>
<p>Interactive calculators for RWAlpha products</p>
<div class="grid">
  <a href="apy/"><div class="label">Yield</div><div class="name">APY Calculator</div><div class="desc">rAI / rSTR 年化收益计算</div></a>
  <a href="etf/"><div class="label">Portfolio</div><div class="name">ETF 组合计算器</div><div class="desc">QQQI + NVDY 组合分析</div></a>
  <a href="rgld/"><div class="label">Gold</div><div class="name">黄金抵押贷款</div><div class="desc">rGLD 抵押贷款计算</div></a>
  <a href="ltv/"><div class="label">Leverage</div><div class="name">LTV 杠杆计算器</div><div class="desc">杠杆投资风险分析</div></a>
</div>
</body>
</html>
